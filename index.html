<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kebap-Bestellung</title>
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero shop-hero">
        <div class="brand-lockup">
          <img class="brand-logo" src="./images/kebap-noble-logo.svg" alt="Kebap Logo" />
          <div class="brand-copy">
            <span class="eyebrow">Donnerstags-Bestellung</span>
            <h1>Kebap Warenkorb</h1>
          </div>
        </div>
        <span id="mode-badge" class="mode-badge hidden-system-badge" aria-hidden="true"></span>
      </header>

      <main class="layout shop-layout">
        <section class="card menu-pane">
          <div class="card-head compact-gap align-start-on-mobile">
            <div>
              <h2>Speisekarte</h2>
            </div>
          </div>

          <div id="category-tabs" class="category-tabs"></div>
          <div id="menu-grid" class="menu-grid"></div>
        </section>

        <aside class="card cart-pane sticky-card">
          <form id="order-form" class="cart-form">
            <div class="cart-top-block">
              <div>
                <h2>Warenkorb</h2>
              </div>
              <div id="deadline-inline" class="inline-status"></div>
            </div>

            <div class="employee-block">
              <label class="field field-full">
                <span>Auswahl *</span>
                <select id="employee" required></select>
              </label>
              <div class="target-date-line">
                <span>Bestelltermin</span>
                <strong id="target-date-label"></strong>
              </div>
            </div>

            <section class="composer-card is-empty" id="composer-card"></section>

            <label class="field field-full">
              <span>Sonderwunsch zum gewählten Gericht</span>
              <textarea id="notes" rows="3" placeholder="z. B. nur Fleisch, Mais, Soße, scharf"></textarea>
            </label>

            <div class="inline-actions">
              <button id="add-to-cart-btn" class="primary-btn add-btn" type="button">In den Warenkorb</button>
              <button id="cancel-edit-btn" class="secondary-btn hidden-inline" type="button">Bearbeiten abbrechen</button>
            </div>

            <section class="cart-section">
              <div class="section-line">
                <h3>Dein Warenkorb</h3>
                <span id="cart-count-pill" class="soft-pill">0 Artikel</span>
              </div>
              <div id="cart-list" class="cart-list"></div>
            </section>

            <section class="payment-card">
              <div class="summary-row">
                <span>Summe Essen</span>
                <strong id="cart-total">0,00 €</strong>
              </div>
              <label class="field field-full">
                <span>Bezahlt in Euro *</span>
                <input
                  id="amount-paid"
                  type="text"
                  inputmode="decimal"
                  placeholder="z. B. 12,00"
                  required
                />
              </label>
              <input id="customer-phone" type="hidden" value="" />
              <div id="payment-hint" class="payment-hint hidden-block" hidden></div>
            </section>

            <div class="field field-full submit-row submit-column-on-mobile">
              <button class="primary-btn wide-btn" type="submit">Warenkorb absenden</button>
              <span id="submit-message" class="inline-message"></span>
            </div>
          </form>
        </aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
